kind = "web"
previewPath = "/"
title = "ExSell Academy"
version = "1.0.0"
id = "artifacts/exsell-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22869

[services.development]
run = "pnpm --filter @workspace/exsell-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exsell-academy", "run", "build" ]
publicDir = "artifacts/exsell-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22869"
BASE_PATH = "/"
