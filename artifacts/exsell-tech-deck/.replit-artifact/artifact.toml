kind = "slides"
previewPath = "/exsell-tech-deck/"
title = "ExSell Academy — Tech Stack"
version = "1.0.0"
id = "artifacts/exsell-tech-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/exsell-tech-deck/" ]
localPort = 20056

[services.development]
run = "pnpm --filter @workspace/exsell-tech-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exsell-tech-deck", "run", "build" ]
publicDir = "artifacts/exsell-tech-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20056"
BASE_PATH = "/exsell-tech-deck/"
